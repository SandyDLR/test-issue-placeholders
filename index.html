<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ARIA Translation Test</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 40px;
    }
    button, div[role="button"] {
      font-size: 20px;
      padding: 10px 15px;
      margin: 10px 0;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <h1>Transifex Live ARIA Test</h1>

  <!-- Visible text (control test) -->
  <p>This text should always be detected for translation.</p>

  <!-- Button with only aria-label -->
  <button aria-label="Open user menu" tx-attrs="aria-label">
    ☰
  </button>

  <!-- Button with visible + aria -->
  <button aria-label="Close dialog"
   tx-attrs="aria-label">
    Close
  </button>

  <!-- Div acting as button -->
  <div role="button" aria-label="Play video" tabindex="0">
    ▶ Play
  </div>

  <!-- Input with aria-label -->
  <input 
    type="text" 
    placeholder="Search..." 
    aria-label="Search input field"
    tx-attrs="aria-label"
  />

  <!-- Image with alt and aria-label -->
  <img 
    src="https://via.placeholder.com/150"
    alt="User profile picture"
    aria-label="Profile image of the user"
    tx-attrs="aria-label, alt"
  />

</body>
</html>
